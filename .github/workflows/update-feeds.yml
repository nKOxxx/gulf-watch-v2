name: Update RSS Feeds

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours (8 times/day instead of 24)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install feedparser
      
    - name: Fetch RSS feeds
      env:
        NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
      run: python scripts/fetch_rss.py
      
    - name: Fetch price data
      run: python scripts/fetch_prices.py
      
    - name: Check for meaningful changes
      id: check_changes
      run: |
        # Check if incidents actually changed (not just timestamp)
        git diff --staged public/incidents.json | grep -q '"id":' && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/incidents.json public/prices.json
        git diff --staged --quiet || (git commit -m "Update incidents and prices from RSS feeds" && git push)
