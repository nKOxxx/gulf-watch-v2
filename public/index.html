<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Gulf Watch - MENA Security Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0a;
            --panel: #111111;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --muted: #888888;
            --accent: #e74c3c;
            --accent-dim: rgba(231, 76, 60, 0.1);
            --success: #2ecc71;
            --warning: #f39c12;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }
        
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-brand img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }
        
        .header-brand h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .header-brand span {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }
        
        .header-stats span { color: var(--muted); }
        .header-stats strong { color: var(--text); }
        
        /* Layout */
        .app-container {
            position: fixed;
            top: 60px; left: 0; right: 0; bottom: 60px;
            display: flex;
        }
        
        /* Desktop: Three panels */
        @media (min-width: 1024px) {
            .finance-panel {
                width: 220px;
                flex-shrink: 0;
            }
            .map-container {
                flex: 1;
            }
            .news-panel {
                width: 380px;
                flex-shrink: 0;
            }
            .mobile-nav { display: none; }
        }
        
        /* Tablet: Two panels */
        @media (min-width: 768px) and (max-width: 1023px) {
            .finance-panel { display: none; }
            .map-container {
                flex: 1;
                position: relative;
            }
            .news-panel {
                width: 320px;
                flex-shrink: 0;
            }
        }
        
        /* Mobile: Single panel with tabs */
        @media (max-width: 767px) {
            .finance-panel, .map-container, .news-panel {
                display: none;
                width: 100%;
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
            }
            .finance-panel.active, .map-container.active, .news-panel.active {
                display: flex;
                flex-direction: column;
            }
            .mobile-nav { display: flex; }
        }
        
        /* Finance Panel */
        .finance-panel {
            background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
        }
        
        .panel-title {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .price-item {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .price-item .label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .price-item .value {
            font-size: 18px;
            font-weight: 600;
            margin: 4px 0;
        }
        
        .price-item .change {
            font-size: 11px;
        }
        .change.up { color: var(--success); }
        .change.down { color: var(--accent); }
        
        /* Map */
        .map-container {
            position: relative;
            background: var(--bg);
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        .map-overlay {
            position: absolute;
            top: 16px; left: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            z-index: 500;
            max-width: calc(100% - 32px);
        }
        
        .map-chip {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .map-chip:hover, .map-chip.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        
        /* News Panel */
        .news-panel {
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .news-filters {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .filter-chip {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 10px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .filter-chip:hover {
            border-color: var(--muted);
            color: var(--text);
        }
        
        .filter-chip.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--text);
        }
        
        .news-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .news-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--border);
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .news-card:hover {
            border-color: var(--muted);
        }
        
        .news-card.critical {
            border-left-color: var(--accent);
            background: linear-gradient(90deg, var(--accent-dim) 0%, var(--card) 100%);
        }
        
        .news-card.warning {
            border-left-color: var(--warning);
        }
        
        .news-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .news-badge {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border: 1px solid;
        }
        
        .news-badge.gov {
            border-color: var(--warning);
            color: var(--warning);
        }
        
        .news-badge.news {
            border-color: #3498db;
            color: #3498db;
        }
        
        .news-time {
            font-size: 11px;
            color: var(--muted);
        }
        
        .news-title {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 6px;
        }
        
        .news-source {
            font-size: 11px;
            color: var(--muted);
        }
        
        /* Mobile Navigation */
        .mobile-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: var(--muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .nav-btn.active {
            color: var(--accent);
        }
        
        .nav-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
        
        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-brand">
            <img src="Tactical radar logo with Arabian Peninsula.png" alt="">
            <div>
                <h1>Gulf Watch</h1>
                <span>MENA Security Monitor</span>
            </div>
        </div>
        <div class="header-stats">
            <div><span>Incidents:</span> <strong id="incidentCount">-</strong></div>
            <div><span>Critical:</span> <strong id="criticalCount" style="color: var(--accent)">-</strong></div>
        </div>
    </header>
    
    <!-- Main Container -->
    <div class="app-container">
        <!-- Finance Panel -->
        <aside class="finance-panel" id="financePanel">
            <div class="panel-title">Market Prices</div>
            <div id="priceList">
                <div class="loading">Loading...</div>
            </div>
        </aside>
        
        <!-- Map -->
        <main class="map-container active" id="mapContainer">
            <div class="map-overlay">
                <button class="map-chip active" onclick="filterMap('all')">All</button>
                <button class="map-chip" onclick="filterMap('uae')">UAE</button>
                <button class="map-chip" onclick="filterMap('saudi')">Saudi</button>
                <button class="map-chip" onclick="filterMap('israel')">Israel</button>
                <button class="map-chip" onclick="filterMap('critical')" style="color: var(--accent)">Critical</button>
            </div>
            <div id="map"></div>
        </main>
        
        <!-- News Panel -->
        <aside class="news-panel" id="newsPanel">
            <div class="news-filters">
                <div class="filter-row">
                    <button class="filter-chip active" onclick="filterNews('all')">All</button>
                    <button class="filter-chip" onclick="filterNews('uae')">UAE</button>
                    <button class="filter-chip" onclick="filterNews('saudi')">Saudi</button>
                    <button class="filter-chip" onclick="filterNews('qatar')">Qatar</button>
                    <button class="filter-chip" onclick="filterNews('israel')">Israel</button>
                </div>
                <div class="filter-row">
                    <button class="filter-chip" onclick="filterNews('critical')">Critical</button>
                    <button class="filter-chip" onclick="filterNews('gov')">Gov Only</button>
                </div>
            </div>
            <div class="news-list" id="newsList">
                <div class="loading">Loading incidents...</div>
            </div>
        </aside>
    </div>
    
    <!-- Mobile Navigation -->
    <nav class="mobile-nav" id="mobileNav">
        <div class="nav-btn" data-view="finance">
            <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7"/></svg>
            <span>Prices</span>
        </div>
        <div class="nav-btn active" data-view="map">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/></svg>
            <span>Map</span>
        </div>
        <div class="nav-btn" data-view="news">
            <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zM8 8h8M8 12h8M8 16h5"/></svg>
            <span>News</span>
        </div>
    </nav>
    
    <script>
        // Data storage
        let incidents = [];
        let prices = {};
        let map = null;
        let markers = [];
        
        // Country centers
        const centers = {
            uae: [23.4241, 53.8478],
            saudi: [23.8859, 45.0792],
            qatar: [25.3548, 51.1839],
            israel: [31.0461, 34.8516],
            bahrain: [26.0667, 50.5577],
            kuwait: [29.3117, 47.4818],
            oman: [21.4735, 55.9754]
        };
        
        // Initialize
        async function init() {
            await loadData();
            initMap();
            renderPrices();
            renderNews();
            updateStats();
            initMobileNav();
        }
        
        // Load data
        async function loadData() {
            try {
                const response = await fetch('incidents.json?v=' + Date.now());
                const data = await response.json();
                incidents = data.incidents || [];
                prices = data.prices || {};
            } catch (e) {
                console.error('Failed to load data:', e);
                document.getElementById('newsList').innerHTML = '<div class="empty">Failed to load data</div>';
            }
        }
        
        // Update stats
        function updateStats() {
            document.getElementById('incidentCount').textContent = incidents.length;
            const critical = incidents.filter(i => i.severity === 'critical').length;
            document.getElementById('criticalCount').textContent = critical;
        }
        
        // Render prices
        function renderPrices() {
            const container = document.getElementById('priceList');
            if (!prices || Object.keys(prices).length === 0) {
                container.innerHTML = '<div class="empty">No price data</div>';
                return;
            }
            
            let html = '';
            
            // Oil
            if (prices.brent) {
                const change = prices.brent.change >= 0 ? 'up' : 'down';
                html += `
                    <div class="price-item">
                        <div class="label">Brent Oil</div>
                        <div class="value">${prices.brent.formatted_price || '$' + prices.brent.price.toFixed(2)}</div>
                        <div class="change ${change}">${prices.brent.formatted_change || prices.brent.change.toFixed(2) + '%'}</div>
                    </div>
                `;
            }
            
            // Gold
            if (prices.gold) {
                const change = prices.gold.change >= 0 ? 'up' : 'down';
                html += `
                    <div class="price-item">
                        <div class="label">Gold</div>
                        <div class="value">${prices.gold.formatted_price || '$' + prices.gold.price.toFixed(0)}</div>
                        <div class="change ${change}">${prices.gold.formatted_change || prices.gold.change.toFixed(2) + '%'}</div>
                    </div>
                `;
            }
            
            // Bitcoin
            if (prices.bitcoin) {
                const change = prices.bitcoin.change >= 0 ? 'up' : 'down';
                html += `
                    <div class="price-item">
                        <div class="label">Bitcoin</div>
                        <div class="value">${prices.bitcoin.formatted_price || '$' + prices.bitcoin.price.toLocaleString()}</div>
                        <div class="change ${change}">${prices.bitcoin.formatted_change || prices.bitcoin.change.toFixed(2) + '%'}</div>
                    </div>
                `;
            }
            
            container.innerHTML = html || '<div class="empty">No prices available</div>';
        }
        
        // Initialize map
        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([25, 50], 5);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            
            L.control.zoom({ position: 'topright' }).addTo(map);
            
            addMarkers(incidents);
        }
        
        // Add markers
        function addMarkers(items) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            items.forEach(item => {
                if (!item.lat || !item.lng) return;
                
                const color = item.severity === 'critical' ? '#e74c3c' :
                             item.severity === 'warning' ? '#f39c12' : '#3498db';
                
                const marker = L.circleMarker([item.lat, item.lng], {
                    radius: 6,
                    fillColor: color,
                    color: '#fff',
                    weight: 1,
                    fillOpacity: 0.8
                }).addTo(map);
                
                marker.bindPopup(`<strong>${item.title}</strong><br><small>${item.source}</small>`);
                marker.on('click', () => {
                    if (item.url) window.open(item.url, '_blank');
                });
                
                markers.push(marker);
            });
        }
        
        // Filter map
        function filterMap(filter) {
            document.querySelectorAll('.map-chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            
            let filtered = incidents;
            if (filter === 'critical') {
                filtered = incidents.filter(i => i.severity === 'critical');
            } else if (filter !== 'all') {
                filtered = incidents.filter(i => i.country === filter);
            }
            
            addMarkers(filtered);
            
            if (centers[filter]) {
                map.setView(centers[filter], 6);
            } else if (filter === 'all') {
                map.setView([25, 50], 5);
            }
        }
        
        // Render news
        function renderNews() {
            const container = document.getElementById('newsList');
            if (incidents.length === 0) {
                container.innerHTML = '<div class="empty">No incidents found</div>';
                return;
            }
            
            container.innerHTML = incidents.map(item => `
                <div class="news-card ${item.severity}" data-country="${item.country}" data-severity="${item.severity}" data-type="${item.type}" onclick="openNews('${item.url || item.link || ''}')">
                    <div class="news-header">
                        <span class="news-badge ${item.isGov ? 'gov' : 'news'}">${item.isGov ? 'Gov' : 'News'}</span>
                        <span class="news-time">${item.time}</span>
                    </div>
                    <div class="news-title">${item.title}</div>
                    <div class="news-source">${item.source}</div>
                </div>
            `).join('');
        }
        
        // Open news
        function openNews(url) {
            if (url && url !== 'undefined' && url !== '') {
                window.open(url, '_blank');
            }
        }
        
        // Filter news
        function filterNews(filter) {
            document.querySelectorAll('.news-filters .filter-chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.news-card').forEach(card => {
                if (filter === 'all') {
                    card.style.display = 'block';
                } else if (filter === 'critical') {
                    card.style.display = card.dataset.severity === 'critical' ? 'block' : 'none';
                } else if (filter === 'gov') {
                    card.style.display = card.dataset.type === 'gov' ? 'block' : 'none';
                } else {
                    card.style.display = card.dataset.country === filter ? 'block' : 'none';
                }
            });
        }
        
        // Mobile navigation
        function initMobileNav() {
            const nav = document.getElementById('mobileNav');
            if (!nav) return;
            
            nav.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const view = btn.dataset.view;
                    
                    nav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    document.querySelectorAll('.finance-panel, .map-container, .news-panel').forEach(p => p.classList.remove('active'));
                    
                    if (view === 'finance') document.getElementById('financePanel').classList.add('active');
                    if (view === 'map') document.getElementById('mapContainer').classList.add('active');
                    if (view === 'news') document.getElementById('newsPanel').classList.add('active');
                });
            });
        }
        
        // Start
        init();
    </script>
</body>
</html>
